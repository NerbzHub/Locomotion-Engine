<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#17212b" />
    <title>Dungeon Defense — Locomotion Engine</title>
  </head>
  <body>
    <main class="game-shell">
      <header class="game-header">
        <div>
          <p class="eyebrow">Locomotion Engine · Gate 1</p>
          <h1>Dungeon Defense</h1>
        </div>
        <button id="start-wave" type="button">Start wave</button>
      </header>

      <canvas id="game-canvas" width="768" height="512" aria-label="Dungeon Defense game board"></canvas>

      <section class="hud" aria-live="polite">
        <span>Gold <strong id="gold">50</strong></span>
        <span>Lives <strong id="lives">10</strong></span>
        <span>Wave <strong id="wave">0</strong></span>
        <span id="message">Click a grass tile to place an archer tower (25 gold).</span>
      </section>

      <p class="hint">Towers automatically fire at slimes. The same seed produces the same wave.</p>
    </main>
    <script type="module" src="/apps/game/src/main.ts"></script>
  </body>
</html>
