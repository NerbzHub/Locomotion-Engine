<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#17212b" />
    <title>Dungeon Defense — Locomotion Engine</title>
  </head>
  <body>
    <main class="game-shell">
      <header class="game-header">
        <div>
          <p class="eyebrow">Locomotion Engine · Gate 1</p>
          <h1>Dungeon Defense</h1>
        </div>
        <div class="game-actions">
          <button id="start-wave" type="button">Start wave</button>
          <button id="restart-game" class="secondary" type="button">Restart</button>
        </div>
      </header>

      <section class="tower-palette" aria-label="Tower selection">
        <span class="palette-label">Build</span>
        <button id="select-archer" class="tower-choice selected" type="button" aria-pressed="true">
          <strong>Archer</strong><span>25 gold · fast shots</span>
        </button>
        <button id="select-mage" class="tower-choice" type="button" aria-pressed="false">
          <strong>Mage</strong><span>35 gold · long range</span>
        </button>
      </section>

      <canvas id="game-canvas" width="768" height="512" aria-label="Dungeon Defense game board"></canvas>

      <section id="tower-inspector" class="tower-inspector" hidden aria-live="polite">
        <div><span class="palette-label">Selected tower</span><strong id="tower-name"></strong></div>
        <span id="tower-stats"></span>
        <button id="upgrade-tower" type="button">Upgrade</button>
      </section>

      <section class="hud" aria-live="polite">
        <span>Gold <strong id="gold">50</strong></span>
        <span>Lives <strong id="lives">10</strong></span>
        <span>Wave <strong id="wave">0/3</strong></span>
        <span id="message">Click a grass tile to place an archer tower (25 gold).</span>
        <span id="placement-message" class="placement-message"></span>
      </section>

      <p class="hint">Beetles absorb some damage; Wisps periodically burst forward. Hover to preview range, and click a tower to inspect or upgrade it.</p>
    </main>
    <script type="module" src="/apps/game/src/main.ts"></script>
  </body>
</html>
